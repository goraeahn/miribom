<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>기초학력 수학 개념지도 v6 · 초안 조망</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#f7f6f2;--card:#fff;--ink:#242424;--ink-soft:#6d6d6d;--line:#e3ded4;--accent:#7a5c2e;
--NUM:#2f6f9f;--REL:#3a8a5a;--GEO:#b8862b;--DATA:#7a5aa0;--diff:#c0532b;--thr:#8a2f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',system-ui,'Malgun Gothic',sans-serif;font-size:14px;line-height:1.55}
h1,h2,h3{font-family:'Noto Sans KR',sans-serif;font-weight:700}
header{padding:12px 20px;border-bottom:1.5px solid var(--ink);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;margin:0}
.sub{color:var(--ink-soft);font-size:12.5px}
.tabs{display:flex;gap:2px;padding:0 16px;border-bottom:1.5px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:6;flex-wrap:wrap}
.tab{padding:9px 15px;cursor:pointer;border:1.5px solid transparent;border-bottom:none;font-weight:700;color:var(--ink-soft);border-radius:8px 8px 0 0}
.tab.on{color:var(--ink);background:var(--card);border-color:var(--line)}
.panel{display:none;padding:16px 20px}
.panel.on{display:block}
.split{display:grid;grid-template-columns:1fr 410px;gap:16px;align-items:start}
@media(max-width:1050px){.split{grid-template-columns:1fr}}
.side{position:sticky;top:54px;max-height:calc(100vh - 74px);overflow:auto;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:14px}
.side.empty{color:var(--ink-soft)}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;border:1px solid var(--line);margin:1px 2px;white-space:nowrap}
.b-diff{background:#fbeae2;border-color:#e6b59e;color:var(--diff)}
.b-thr{background:#f6e2e2;border-color:#d8a3a3;color:var(--thr);font-weight:700}
.b-type{background:#eef1e9;border-color:#c7d0b8}
.b-strand{color:#fff;border:none}
.chip{font-size:11.5px;color:var(--ink-soft)}
/* cards */
.cards{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 14px}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 16px;min-width:110px}
.card .n{font-size:24px;font-weight:700;color:var(--accent)}
.card .l{font-size:12px;color:var(--ink-soft)}
table.g{border-collapse:collapse;width:100%;font-size:12.5px;margin:6px 0 16px}
table.g th,table.g td{border:1px solid var(--line);padding:5px 9px;text-align:left}
table.g th{background:#f0ece2}
table.g td.num,table.g th.num{text-align:right}
.sec{margin:16px 0}
.sec h2{font-size:16px;border-bottom:1.5px solid var(--line);padding-bottom:4px;margin-bottom:8px}
/* map */
.legend{font-size:11.5px;color:var(--ink-soft);margin:2px 2px 10px}
.legend span{margin-right:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:middle}
#mapWrap{overflow:auto;border:1.5px solid var(--line);border-radius:10px;background:var(--card);max-height:calc(100vh - 140px)}
#mapInner{position:relative}
#edgeSvg{position:absolute;top:0;left:0;pointer-events:none}
.snode{position:absolute;border:1.4px solid var(--line);background:#fff;border-radius:7px;padding:3px 7px;font-size:11px;cursor:pointer;width:140px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.snode .t{font-weight:500;display:block;line-height:1.2}
.snode .m{color:var(--ink-soft);font-size:9.5px}
.snode.dim{opacity:.14}.snode.sel{border-color:var(--ink);border-width:2px;box-shadow:0 0 0 3px #efe7d4}
.snode.pre{border-color:var(--NUM);box-shadow:0 0 0 2px #dcebf5}.snode.post{border-color:var(--REL);box-shadow:0 0 0 2px #dcefe2}
.snode.draft{border-style:dashed}
.b-warn{background:#fff6d2;border-color:#e0c34a;color:#8a6d1a;font-weight:700}
.b-conf{background:#eef1e9;border-color:#c7d0b8;color:var(--ink-soft)}
.areaHead{position:absolute;font-weight:700;font-size:13px;padding:2px 10px;border-radius:6px;color:#fff}
.gradeBand{position:absolute;left:0;right:0;border-top:1px dashed var(--line)}
.gradeLab{position:absolute;left:4px;font-size:10.5px;color:var(--ink-soft);font-weight:700;background:var(--card);padding:0 3px}
/* list */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.toolbar input[type=text]{padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;min-width:220px}
.toolbar select{padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;font-size:12.5px}
.fbtn{padding:6px 11px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12px}
.fbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
#listWrap{max-height:calc(100vh - 210px);overflow:auto;border:1.5px solid var(--line);border-radius:10px;background:var(--card)}
.grphead{position:sticky;top:0;background:#f0ece2;padding:6px 12px;font-weight:700;font-size:12.5px;cursor:default;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--line);z-index:1}
.grphead .u{color:var(--ink-soft);font-weight:400;font-size:11.5px}.grphead .cnt{margin-left:auto;color:var(--ink-soft);font-size:11.5px}
.row{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 22px;cursor:pointer;border-bottom:1px solid #f1ece2;position:relative}
.row:hover{background:#faf6ec}.row.sel{background:#f3ead2}
.rail{position:absolute;left:12px;top:0;bottom:0;width:3px;border-radius:2px}
.row .lab{flex:1;font-size:13px}.row .lab .us{color:var(--ink-soft);font-size:11px}
.row .bar{height:8px;border-radius:4px;background:#d9c7a8;min-width:2px}
.row .barwrap{width:66px;display:flex;align-items:center;gap:5px;color:var(--ink-soft);font-size:10.5px}
.mut{color:var(--ink-soft)}
.side h3{margin:0 0 8px;font-size:15px}.side .meta{font-size:12.5px;margin:2px 0}
.lst{margin:6px 0 12px;padding:0;list-style:none}
.lst li{padding:5px 8px;border:1px solid var(--line);border-radius:7px;margin:4px 0;font-size:12.5px;background:#fcfaf5}
.lst li .s{color:var(--ink-soft);font-size:11px}
details{margin:8px 0;border:1px solid var(--line);border-radius:8px;background:#fcfaf5}
details>summary{cursor:pointer;padding:7px 10px;font-weight:500;font-size:12.5px;list-style:none}
details>summary::-webkit-details-marker{display:none}
details>summary::before{content:'▸ ';color:var(--ink-soft)}
details[open]>summary::before{content:'▾ '}
details .body{padding:0 10px 8px}
.learn{background:#eef4ee;border:1.5px solid #bcd4bf;border-radius:9px;padding:10px 12px;margin:8px 0}
.learn .h{font-weight:700;font-size:12.5px;color:#2f6f4a;margin-bottom:5px}
.learn .step{display:flex;gap:6px;align-items:flex-start;margin:3px 0;font-size:12.5px}
.learn .k{color:var(--ink-soft);min-width:66px}
.chain{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin:4px 0;font-size:12px}
.chain .lnk{background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 7px}.chain .arw{color:var(--ink-soft)}
/* treemap */
#tree{border:1.5px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
.tstrand{display:flex;border-bottom:2px solid var(--paper)}
.tstrandlab{writing-mode:vertical-rl;text-orientation:mixed;padding:4px 2px;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;min-width:24px}
.tunits{display:flex;flex:1}
.tunit{border-right:2px solid var(--paper);display:flex;flex-direction:column;min-width:0}
.tunitlab{font-size:10.5px;padding:2px 4px;color:var(--ink-soft);background:#f4f0e7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid var(--line)}
.tskill{border-bottom:1px solid rgba(255,255,255,.6);padding:2px 5px;font-size:10px;color:#fff;overflow:hidden;cursor:default;display:flex;align-items:center}
.tskill.thr{outline:2px solid var(--thr);outline-offset:-2px}
.prov{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin:8px 0;font-size:12.5px}
.prov h3{margin:0 0 4px;font-size:14px}.prov .lic{color:var(--diff);font-size:11.5px}
.pipe{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:8px 0}
.pipe .st{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px}.pipe .st b{color:var(--accent)}.pipe .a{color:var(--ink-soft)}
.small{font-size:11.5px;color:var(--ink-soft)}
.slider{display:flex;align-items:center;gap:8px;margin:8px 0}input[type=range]{width:180px}
.note{background:#f4f0e6;border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;font-size:12px;margin:8px 0}
.doc{max-width:none}.doc p{margin:6px 0}.doc h2{margin-top:20px}
.gloss{border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:6px 0;background:var(--card)}
.gloss b{color:var(--accent)}

/* network tab */
.nettool{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.nettool input#nq{padding:6px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:12.5px;width:150px}
.netbox{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:4px 8px;font-size:12px;display:flex;gap:5px;align-items:center}
.netwrap{position:relative;border:1.5px solid var(--line);border-radius:10px;background:var(--card);height:calc(100vh - 170px);overflow:hidden}
svg#net{width:100%;height:100%;display:block;cursor:grab}
.netzoom{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:4}
.netzoom button{width:30px;height:30px;border:1.5px solid var(--line);background:#fff;border-radius:7px;font-size:16px;cursor:pointer;line-height:1}
.netlegend{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.92);border:1.5px solid var(--line);border-radius:8px;padding:6px 9px;font-size:11px;color:var(--ink-soft);max-width:70%}
.netlegend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:3px;vertical-align:middle}.netlegend span{margin-right:9px;white-space:nowrap}
.nnode{cursor:pointer}.nnode text{font-size:9.5px;fill:#222;paint-order:stroke;stroke:#fff;stroke-width:2.4px;pointer-events:none}
.nnode.hidden{display:none}
.gauge{background:#f4f0e6;border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;margin:8px 0}
.gauge .big{font-size:22px;font-weight:700;color:var(--accent)}.gauge .lab{font-size:12px;color:var(--ink-soft)}
.gbar{height:8px;background:#e7ddc7;border-radius:4px;margin-top:6px;overflow:hidden}.gbar>i{display:block;height:100%;background:var(--accent)}
.tabs .tab[data-t="prov"]{margin-left:auto}
#p-prov,#p-help{max-width:1440px;margin-left:auto;margin-right:auto;font-size:15px}
#p-prov .sec h2,#p-help .sec h2,#p-help h2{font-size:21px}
#p-help .doc p{font-size:15px}
</style></head><body>
<header><h1>기초학력 수학 개념지도</h1><span class="sub">초1–중2 · 초안 거시 조망 <span id="ver"></span></span></header>
<div class="tabs">
<div class="tab on" data-t="ov">개요</div>
<div class="tab" data-t="map">개념지도</div>
<div class="tab" data-t="net">관계망</div>
<div class="tab" data-t="mc">오개념 · 난개념</div>
<div class="tab" data-t="tree">전체 형태</div>
<div class="tab" data-t="prov">출처 · 가공 이력</div>
<div class="tab" data-t="help">도움말</div>
</div>
<div class="panel on" id="p-ov"></div>
<div class="panel" id="p-map">
 <div class="legend" id="maplegend"></div>
 <div class="split"><div id="mapWrap"><div id="mapInner"><svg id="edgeSvg"></svg></div></div>
 <div class="side empty" id="mapside">스킬을 선택하면 우측에 종속 오개념·난개념 리스트가 열립니다. 선행·후속 개념은 접힘으로 제공됩니다.</div></div>
</div>
<div class="panel" id="p-net">
 <div class="nettool">
  <input type="text" id="nq" placeholder="스킬 검색…">
  <span class="netbox">영역 <span id="nStrandF"></span></span>
  <span class="netbox">강조 <button class="fbtn" data-nhl="none">없음</button><button class="fbtn on" data-nhl="dep">병목</button><button class="fbtn" data-nhl="diff">난개념</button><button class="fbtn" data-nhl="thr">핵심</button></span>
  <span class="netbox">크기 <button class="fbtn on" data-nsz="dep">후속수</button><button class="fbtn" data-nsz="mc">오개념수</button></span>
  <button class="fbtn" id="nReheat">재배치</button><button class="fbtn" id="nReset">선택 해제</button>
  <label class="netbox"><input type="checkbox" id="nSat"> 오개념 위성</label>
 </div>
 <div class="split"><div class="netwrap"><svg id="net" viewBox="0 0 1200 760"><g id="nEdges"></g><g id="nSatG"></g><g id="nNodes"></g></svg><div class="netlegend" id="netlegend"></div></div>
 <div class="side empty" id="netside">노드를 클릭하면 선행(파랑)·후속(초록) 계보가 강조되고, “이 개념 위에 몇 개가 쌓이는가(핵심성)”·종속 오개념·보정 연결이 열립니다.</div></div>
</div>
<div class="panel" id="p-mc">
 <div class="toolbar">
  <input type="text" id="q" placeholder="오개념·스킬·단위 검색…">
  <select id="fstrand"><option value="">영역 전체</option></select>
  <select id="fgrade"><option value="">학년 전체</option></select>
  <button class="fbtn" id="fdiff">난개념만</button>
  <select id="ftype"><option value="">유형 전체</option><option value="PROC">절차오류</option><option value="CONC">개념오류</option><option value="OVER">과잉일반화</option><option value="LANG">언어·표기혼동</option></select>
  <select id="fgroup"><option value="unit">단위로 묶기</option><option value="skill">스킬로 묶기</option><option value="type">유형으로 묶기</option></select>
  <span class="small" id="mccount"></span>
 </div>
 <div class="split"><div id="listWrap"></div>
 <div class="side empty" id="mcside">오개념을 선택하면 “무엇을 공부해야 하는가(학습 경로)”와 형제 오개념이 열립니다.</div></div>
</div>
<div class="panel" id="p-tree"></div>
<div class="panel" id="p-prov"><div id="provbody"></div></div>
<div class="panel" id="p-help"></div>

<script>
const B=JSON.parse(document.getElementById('bundle').textContent);
const SC={NUM:'#2f6f9f',REL:'#3a8a5a',GEO:'#b8862b',DATA:'#7a5aa0','':'#888'};
const GORD=['E12','E34','E56','M1','M2'],SORD=['NUM','REL','GEO','DATA'],SALL=['NUM','REL','GEO','DATA',''];
const skillById={},unitById={},unitOf={},catBySkill={},reqOut={},reqIn={};
B.skills.forEach(s=>{skillById[s.id]=s;catBySkill[s.id]=[]});
B.units.forEach(u=>unitById[u.id]=u);
B.contains.forEach(e=>{if(skillById[e.to])unitOf[e.to]=e.from});
B.requires.forEach(e=>{(reqOut[e.from]=reqOut[e.from]||[]).push(e.to);(reqIn[e.to]=reqIn[e.to]||[]).push(e.from)});
B.catalog.forEach(c=>{(catBySkill[c.skill]=catBySkill[c.skill]||[]).push(c)});
const origOfSkill=s=>(catBySkill[s]||[]).reduce((a,c)=>a+c.n,0);
const st=B.stats;
document.getElementById('ver').textContent='· '+B.meta.version+' ('+B.meta.updated+')';
function walk(id,adj){const seen=new Set(),stk=[id];while(stk.length){const x=stk.pop();(adj[x]||[]).forEach(y=>{if(!seen.has(y)){seen.add(y);stk.push(y)}})}return seen;}
function unitLabel(sid){const u=unitById[unitOf[sid]];return u?u.label:'(미배치)';}
function badgesFor(sk){let h='';if(sk.threshold)h+='<span class="badge b-thr">핵심후보</span>';else if(sk.difficult)h+='<span class="badge b-diff">난개념</span>';if(sk.status==='draft_v6')h+='<span class="badge b-conf">v6 신설</span>';return h;}

/* tabs */
let built={};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
 document.getElementById('p-'+t.dataset.t).classList.add('on');
 const f={map:drawMap,net:drawNet,tree:drawTree,ov:drawOverview,prov:renderProv,help:renderHelp}[t.dataset.t];
 if(f&&!built[t.dataset.t]){f();built[t.dataset.t]=1;}
});

/* ---------- OVERVIEW ---------- */
function drawOverview(){
 const byS={},byG={},byType={PROC:0,CONC:0,OVER:0,LANG:0};
 SALL.forEach(s=>byS[s]={skills:0,draftSkills:0,units:new Set(),reps:0,orig:0,diff:0,thr:0});
 GORD.forEach(g=>byG[g]={skills:0,draftSkills:0,reps:0});
 B.skills.forEach(s=>{const b=byS[s.strand];if(b){b.skills++;if(s.status==='draft_v6')b.draftSkills++;if(s.difficult)b.diff++;if(s.threshold)b.thr++;}if(byG[s.grade]){byG[s.grade].skills++;if(s.status==='draft_v6')byG[s.grade].draftSkills++;}});
 B.catalog.forEach(c=>{const b=byS[c.strand];if(b){b.reps++;b.orig+=c.n;b.units.add(unitOf[c.skill]);}const g=skillById[c.skill]?skillById[c.skill].grade:'';if(byG[g])byG[g].reps+=1;if(c.type)byType[c.type]++;});
 const thr=B.skills.filter(s=>s.threshold);
 const totalOrig=B.catalog.reduce((a,c)=>a+c.n,0);
 const confirmedSkills=st.skills-(st.new_skills_v6||0);
 const confirmedUnits=st.units-(st.new_units_v6||0);
 const confirmedReq=st.requires-(st.draft_requires_v6||0);
 let h=`<div class="sec"><h2>확정 범위</h2><div class="cards">
  <div class="card"><div class="n">${confirmedUnits}</div><div class="l">개념 단위</div></div>
  <div class="card"><div class="n">${confirmedSkills}</div><div class="l">스킬</div></div>

/* ---------- MAP: 영역당 2열, 학년 밴드 정렬 ---------- */
function drawMap(){
 const inner=document.getElementById('mapInner'),svg=document.getElementById('edgeSvg');
 document.getElementById('maplegend').innerHTML=
  SORD.map(s=>`<span><i class="dot" style="background:${SC[s]}"></i>${B.strand_ko[s]}</span>`).join('')+
  `<span><i class="dot" style="background:#fff;border:1.4px solid #c0532b"></i>난개념</span><span><i class="dot" style="background:#f6e2e2;border:1px solid #8a2f2f"></i>핵심후보</span>`+
  `<span><i class="dot" style="background:#fff;border:1.4px dashed #6d6d6d"></i>v6 신설(초안)</span>`+
  `<span class="small">· 클릭: 선행(파랑)·후속(초록) 강조</span> <button class="fbtn" id="mapReset" style="margin-left:8px;padding:2px 9px">선택 해제</button>`;
 document.getElementById('mapReset').onclick=resetMap;
 document.getElementById('mapInner').addEventListener('click',e=>{if(!e.target.closest('.snode'))resetMap();});
 const colW=150,gap=14,areaGap=30,rowH=44,padT=44,padL=34;
 // group skills by strand+grade
 const byСG={};SORD.forEach(s=>{byСG[s]={};GORD.forEach(g=>byСG[s][g]=[])});
 B.skills.forEach(s=>{if(byСG[s.strand]&&byСG[s.strand][s.grade])byСG[s.strand][s.grade].push(s)});
 const colsOf={NUM:3,REL:2,GEO:2,DATA:1};
 // band heights: max over strands of ceil(count/cols)
 const bandRows={},bandY={};let cy=padT;
 GORD.forEach(g=>{let mx=1;SORD.forEach(s=>{mx=Math.max(mx,Math.ceil(byСG[s][g].length/colsOf[s]))});bandRows[g]=mx;bandY[g]=cy;cy+=mx*rowH+10});
 const H=cy+10;
 // strand x base (area width depends on that strand's column count)
 const areaWOf={};SORD.forEach(s=>areaWOf[s]=colsOf[s]*colW+(colsOf[s]-1)*gap);
 const xBase={};let cx=padL;SORD.forEach(s=>{xBase[s]=cx;cx+=areaWOf[s]+areaGap;});
 const W=cx;
 inner.style.width=W+'px';inner.style.height=H+'px';svg.setAttribute('width',W);svg.setAttribute('height',H);
 svg.innerHTML='';inner.querySelectorAll('.snode,.areaHead,.gradeBand,.gradeLab').forEach(e=>e.remove());
 // grade bands
 GORD.forEach(g=>{const bd=document.createElement('div');bd.className='gradeBand';bd.style.top=(bandY[g]-6)+'px';inner.appendChild(bd);
   const gl=document.createElement('div');gl.className='gradeLab';gl.style.top=(bandY[g]-6)+'px';gl.textContent=B.grade_ko[g];inner.appendChild(gl);});
 // area heads
 SORD.forEach(s=>{const h=document.createElement('div');h.className='areaHead';h.style.left=xBase[s]+'px';h.style.top='8px';h.style.background=SC[s];h.textContent=B.strand_ko[s];inner.appendChild(h);});
 const pos={};
 SORD.forEach(s=>{GORD.forEach(g=>{byСG[s][g].forEach((sk,i)=>{const cols=colsOf[s];const col=i%cols,row=Math.floor(i/cols);
   pos[sk.id]={x:xBase[s]+col*(colW+gap),y:bandY[g]+row*rowH};});})});
 B.skills.forEach(sk=>{const p=pos[sk.id];if(!p)return;const n=document.createElement('div');n.className='snode'+(sk.status==='draft_v6'?' draft':'');n.id='n_'+sk.id;
   n.style.left=p.x+'px';n.style.top=p.y+'px';n.style.borderColor=SC[sk.strand];
   if(sk.difficult)n.style.borderColor='#c0532b';if(sk.threshold)n.style.background='#f6e2e2';
   n.innerHTML=`<span class="t">${sk.label}</span><span class="m">${B.grade_ko[sk.grade]} · 오개념 ${sk.mc}${sk.threshold?' · 핵심':(sk.difficult?' · 난':'')}${sk.status==='draft_v6'?' · v6 신설':''}</span>`;
   n.onclick=()=>selSkill(sk.id);inner.appendChild(n);});
 B.requires.forEach(e=>{const a=pos[e.from],b2=pos[e.to];if(!a||!b2)return;
   const x1=a.x+70,y1=a.y+16,x2=b2.x+70,y2=b2.y+16;
   const path=document.createElementNS('http://www.w3.org/2000/svg','path');
   path.setAttribute('d',`M${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`);
   path.setAttribute('fill','none');path.setAttribute('stroke','#e0d6bd');path.setAttribute('stroke-width','1');
   if(e.status==='draft')path.setAttribute('stroke-dasharray','4,3');
   path.setAttribute('data-f',e.from);path.setAttribute('data-t',e.to);path.classList.add('edge');svg.appendChild(path);});
}
function selSkill(id){
 const pre=walk(id,reqOut),post=walk(id,reqIn),keep=new Set([id,...pre,...post]);
 document.querySelectorAll('.snode').forEach(n=>n.classList.remove('sel','pre','post','dim'));
 document.querySelectorAll('.edge').forEach(p=>{p.setAttribute('stroke','#ece3cd');p.setAttribute('stroke-width','1')});
 B.skills.forEach(s=>{const n=document.getElementById('n_'+s.id);if(!n)return;
   if(s.id===id)n.classList.add('sel');else if(pre.has(s.id))n.classList.add('pre');else if(post.has(s.id))n.classList.add('post');else n.classList.add('dim');});
 document.querySelectorAll('.edge').forEach(p=>{if(keep.has(p.getAttribute('data-f'))&&keep.has(p.getAttribute('data-t'))){p.setAttribute('stroke','#a98a4a');p.setAttribute('stroke-width','1.8')}});
 const n=document.getElementById('n_'+id);if(n)n.scrollIntoView({block:'center',inline:'center',behavior:'smooth'});
 renderSkillSide(id,pre,post);
}

/* ---------- TREEMAP 전체 형태 ---------- */
function drawTree(){
 const totalOrig=B.catalog.reduce((a,c)=>a+c.n,0);const Htot=560;
 let h='<div class="note">칸 크기 = 병합 원본(오개념) 수 = 예상 문제 양의 밀도. 색=영역, 빨간 테두리=난개념, 강조 테두리=핵심. 어디에 오개념이 몰리고 어디가 비었는지 한눈에 보입니다.</div>';
 h+='<div id="tree">';
 SORD.forEach(s=>{
  const units=B.units.filter(u=>u.strand===s);
  const uData=units.map(u=>{const sks=B.skills.filter(k=>unitOf[k.id]===u.id);const orig=sks.reduce((a,k)=>a+origOfSkill(k.id),0);return {u,sks,orig};}).filter(x=>x.sks.length);
  const sOrig=uData.reduce((a,x)=>a+x.orig,0)||1;
  const bandH=Math.max(64,(sOrig/totalOrig)*Htot*SORD.length*0.7);
  h+=`<div class="tstrand" style="height:${bandH}px"><div class="tstrandlab" style="background:${SC[s]}">${B.strand_ko[s]}</div><div class="tunits">`;
  uData.sort((a,b)=>b.orig-a.orig).forEach(x=>{
   const w=Math.max(6,(x.orig/sOrig)*100);
   h+=`<div class="tunit" style="flex:0 0 ${w}%" title="${x.u.label} · 원본 ${x.orig}"><div class="tunitlab">${x.u.label}</div>`;
   const uo=x.orig||1;
   x.sks.sort((a,b)=>origOfSkill(b.id)-origOfSkill(a.id)).forEach(k=>{
    const o=origOfSkill(k.id);const hh=Math.max(3,(o/uo)*100);
    const op=k.mc?0.55+Math.min(0.4,o/60):0.18;
    h+=`<div class="tskill ${k.threshold?'thr':''}" style="flex:0 0 ${hh}%;background:${SC[s]};opacity:${op};${k.difficult?'box-shadow:inset 0 0 0 2px #c0532b;':''}${k.status==='draft_v6'?'outline:1px dashed #fff;outline-offset:-3px;':''}" title="${k.label} · 오개념대표 ${k.mc} · 원본 ${o}${k.threshold?' · 핵심':k.difficult?' · 난개념':''}${k.status==='draft_v6'?' · v6 신설':''}">${hh>7?k.label:''}</div>`;
   });
   h+=`</div>`;
  });
  h+=`</div></div>`;
 });
 h+='</div>';
 h+=`<div class="small" style="margin-top:8px">※ 점선 테두리 칸 = v6에서 신설된 스킬(초안, 교사 검수 대상).</div>`;
 document.getElementById('p-tree').innerHTML=h;
}

 <div class="sec"><h2>5. 병합·분류 규칙</h2>
 <div class="gloss"><b>병합 — 맥락은 하나로.</b> 같은 인지오류는 맥락이 달라도 1개로 병합합니다(“자연수/분수/소수를 곱하면 커진다” → “곱하면 항상 커진다고 생각함” 하나). 병합 시 가장 명확한 <b>대표 문구 1개</b>를 고르고, 흡수된 <b>원본 ID·예시 수</b>를 함께 보존합니다.</div>
 <div class="gloss"><b>난개념 판정 근거</b>(우선순위) — ① 오답률 데이터(확보 시 1순위) ② 오개념 밀도(그 스킬에 붙은 구별 오개념 수, 현재 사용 중) ③ 교사 판단. 목표 규모 25~35개.</div>
 <div class="gloss"><b>핵심개념·유형태그는 후보</b> — 핵심개념은 문헌 근거로 <b>후보만</b> 표시(최종 8~12개 교사 확정). 유형태그는 <b>난개념에 연결된 오개념에만</b> 지배적 성격 하나를 후보로 부착(작업량 절감+처방 초점).</div>
 <div class="gloss"><b>보정 연결 무결성</b> — 오개념·난개념에서 다시 배울 <b>단원</b>으로 향하며(재학습은 단원 단위), 반드시 <b>자기보다 하위(선행) 단원</b>을 가리켜야 합니다. 상위·동일 단원 지목은 오류(무한루프).</div></div>

 <div class="sec"><h2>6. 탭별 활용 방법</h2>
 <p class="small">표시 규칙: 선행개념은 <b>파랑</b>, 후속개념은 <b>초록</b>으로 나타냅니다.</p>
 <div class="gloss"><b>개요</b> — 무엇을 보나: 영역·학년·유형별 개수와 핵심개념 후보 목록. <br>어떻게 쓰나: 작업 착수 전 <b>규모 감각</b>을 잡습니다. 어느 영역이 대표 오개념이 많은지, 난개념이 어디 몰렸는지 숫자로 먼저 확인하세요.</div>
 <div class="gloss"><b>개념지도</b> — 무엇을 보나: 영역을 2열로, 학년 밴드로 정렬한 구조도(선행관계 연결). <br>어떻게 쓰나: 스킬을 클릭하면 <b>선행(파랑)·후속(초록)</b> 개념이 색으로 표시됩니다. 한 개념을 가르치기 전에 무엇이 전제되고 그 위에 무엇이 쌓이는지 <b>학습 순서</b>를 설계할 때 씁니다. 우측 패널에 종속 오개념·난개념이 열립니다.</div>
 <div class="gloss"><b>관계망</b> — 무엇을 보나: 스킬을 노드로, 선행관계를 링크로 한 물리 기반 그물망. 원 크기 = <b>후속 개념 수(병목성)</b>. <br>어떻게 쓰나: 크게 그려진 노드가 <b>병목(많은 개념의 전제가 되는 지점)</b>입니다. 핵심개념 판단·우선순위 결정에 쓰세요. 노드 클릭 → 계보 색 표시 + 후속 개념 수 게이지. 마우스 휠로 <b>확대·축소</b>, 빈 곳을 끌어 이동, ＋/−/⤡ 버튼도 있습니다. “오개념 위성”을 켜면 선택 스킬 둘레에 대표 오개념이 붙습니다.</div>
 <div class="gloss"><b>오개념·난개념</b> — 무엇을 보나: 오개념을 중심에 둔 검색형 리스트(단위·스킬·유형 표시, 예시수 막대). <br>어떻게 쓰나: 검색·필터로 특정 오개념을 찾고, 클릭하면 우측에 <b>“무엇을 공부해야 하는가(학습 경로)”</b> — 발현 스킬 → 다시 배울 단위(보정 연결) → 먼저 다질 선행개념이 열립니다.</div>
 <div class="gloss"><b>전체 형태</b> — 무엇을 보나: 트리맵. 칸 크기 = 오개념 밀도. <br>어떻게 쓰나: 큰 칸 = 오개념이 몰린 군집, 작은/빈 칸 = 얇은 곳. <b>콘텐츠·문항을 어디에 몰지</b>를 한눈에 봅니다.</div>
 <div class="gloss"><b>출처·가공 이력</b> — 데이터 출처·라이선스, 파이프라인, 버전 이력, 예상 진단 문항 규모(슬라이더)를 확인합니다.</div></div>

 <div class="sec"><h2>7. 선생님이 결정할 것 (뷰어가 비워둔 판단)</h2>
 <p>다음은 의도적으로 <b>초안·후보</b>로만 두었습니다. 뷰어의 관계·병목·분포를 근거로 <b>선생님이 확정</b>합니다: ① 핵심개념 최종 지정, ② 오개념 유형태그 확정, ③ 개념별 적합 <b>활동 유형(비교·분류·구성·조작·표현·설명)</b> 매핑, ④ 콘텐츠 밀도를 몰 <b>전환 구간</b> 선정, ⑤ 병합 대표 문구 검수.</p></div>

 <div class="sec"><h2>8. 검수 체크리스트</h2>
 <div class="gloss">□ 병합된 오개념의 대표 문구가 명확한가 &nbsp; □ 유형태그가 처방 방향(연습 vs 재설명)과 맞는가 &nbsp; □ 핵심개념 8~12개가 “못 넘으면 뒤가 막히는” 것이 맞는가 &nbsp; □ 난개념 판정이 실제 지도 경험과 맞는가 &nbsp; □ 보정 연결이 하위 단원을 가리키는가 &nbsp; □ 병합으로 놓친 오개념 맥락이 없는가</div></div>

let drawNet;(function(){
 const remBySkill={};(B.remediates||[]).forEach(e=>{if(e.from[0]==='S'){(remBySkill[e.from]=remBySkill[e.from]||[]).push(e.to)}});
 const Wn=1200,Hn=760,anchors={NUM:[330,250],REL:[880,250],GEO:[330,560],DATA:[880,560]};

 function build(){

  nById={};N.forEach(n=>nById[n.id]=n);

  E.forEach(e=>{const l=document.createElementNS(SVGNS,'line');l.setAttribute('stroke','#e0d6bd');l.setAttribute('stroke-width','1');if(e.status==='draft')l.setAttribute('stroke-dasharray','4,3');gE.appendChild(l);e._el=l;});
  N.forEach(n=>{const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','nnode');
   const c=document.createElementNS(SVGNS,'circle');c.setAttribute('r',radius(n));c.setAttribute('fill',SC[n.s.strand]);c.setAttribute('fill-opacity','.82');
   c.setAttribute('stroke',n.s.difficult?'#c0532b':(n.s.threshold?'#caa63a':'#fff'));c.setAttribute('stroke-width',n.s.difficult?2.4:(n.s.threshold?3:1.2));
   if(n.s.status==='draft_v6')c.setAttribute('stroke-dasharray','4,3');
   const t=document.createElementNS(SVGNS,'text');t.setAttribute('text-anchor','middle');t.setAttribute('y',radius(n)+10);t.textContent=n.s.label;
   g.appendChild(c);g.appendChild(t);n._g=g;n._c=c;n._t=t;
   g.addEventListener('pointerdown',ev=>startDrag(ev,n));
   g.addEventListener('click',()=>{if(!dragMoved)sel(n.id);});
   gN.appendChild(g);});
  document.getElementById('netlegend').innerHTML=SORD.map(s=>`<span><i class="dot" style="background:${SC[s]}"></i>${B.strand_ko[s]}</span>`).join('')+`<span><i class="dot" style="background:#fff;border:2px solid #c0532b"></i>난개념</span><span><i class="dot" style="background:#fff;border:2px solid #caa63a"></i>핵심</span><span><i class="dot" style="background:#fff;border:2px dashed #6d6d6d"></i>v6 신설(초안)</span><span>원 크기=후속 개념 수</span>`;
  const sf=document.getElementById('nStrandF');SORD.forEach(s=>{const b=document.createElement('button');b.className='fbtn on';b.textContent=B.strand_ko[s];b.onclick=()=>{activeStrand[s]=!activeStrand[s];b.classList.toggle('on',activeStrand[s]);reheat(.4);style();};sf.appendChild(b);});
  document.querySelectorAll('[data-nhl]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-nhl]').forEach(x=>x.classList.remove('on'));b.classList.add('on');hlMode=b.dataset.nhl;if(selId){selId=null;egoSet=null;resetStroke();gS.innerHTML='';}style();});
  document.querySelectorAll('[data-nsz]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-nsz]').forEach(x=>x.classList.remove('on'));b.classList.add('on');sizeMode=b.dataset.nsz;reheat(.5);style();});

  function applyVB(){svg.setAttribute('viewBox',vb.x+' '+vb.y+' '+vb.w+' '+vb.h);}
  function c2s(ev){const r=svg.getBoundingClientRect();return {x:vb.x+(ev.clientX-r.left)/r.width*vb.w,y:vb.y+(ev.clientY-r.top)/r.height*vb.h};}
  svg.addEventListener('wheel',ev=>{ev.preventDefault();const p=c2s(ev);const k=ev.deltaY<0?0.85:1.18;const nw=Math.max(220,Math.min(2600,vb.w*k)),nh=nw*(Hn/Wn);vb.x=p.x-(p.x-vb.x)*(nw/vb.w);vb.y=p.y-(p.y-vb.y)*(nh/vb.h);vb.w=nw;vb.h=nh;applyVB();},{passive:false});
  let panMoved=false;

  // zoom buttons
  const zc=document.createElement('div');zc.className='netzoom';zc.innerHTML='<button id="nzin">+</button><button id="nzout">−</button><button id="nzfit">⤡</button>';
  svg.parentNode.appendChild(zc);
  function zoomAt(k){const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;const nw=Math.max(220,Math.min(2600,vb.w*k)),nh=nw*(Hn/Wn);vb.x=cx-nw/2;vb.y=cy-nh/2;vb.w=nw;vb.h=nh;applyVB();}

 function resetStroke(){N.forEach(n=>{n._c.setAttribute('stroke',n.s.difficult?'#c0532b':(n.s.threshold?'#caa63a':'#fff'));n._c.setAttribute('stroke-width',n.s.difficult?2.4:(n.s.threshold?3:1.2));});}

   let dim=false;if(selId)dim=!(egoSet&&egoSet.has(n.id));else if(hlMode==='diff'&&!n.s.difficult)dim=true;else if(hlMode==='thr'&&!n.s.threshold)dim=true;
   n._g.style.opacity=dim?0.15:1;n._t.style.display=labelVisible(n)?'':'none';
   if(hlMode==='dep'&&!selId){const v=(n.s.dep||0)/maxDep;n._c.setAttribute('fill-opacity',(.28+.6*v).toFixed(2));}else n._c.setAttribute('fill-opacity','.82');});
  E.forEach(e=>{const vis=activeStrand[nById[e.from].s.strand]&&activeStrand[nById[e.to].s.strand];e._el.style.display=vis?'':'none';
   if(selId){const inEgo=egoSet&&egoSet.has(e.from)&&egoSet.has(e.to);e._el.setAttribute('stroke',inEgo?'#a98a4a':'#eee3cc');e._el.setAttribute('stroke-width',inEgo?1.8:0.8);}else{e._el.setAttribute('stroke','#e0d6bd');e._el.setAttribute('stroke-width','1');}});

 function sel(id){selId=id;egoPre=walk(id,reqOut);egoPost=walk(id,reqIn);egoSet=new Set([id,...egoPre,...egoPost]);
  N.forEach(n=>{if(n.id===id){n._c.setAttribute('stroke','#111');n._c.setAttribute('stroke-width',3.4);}
   else if(egoSet.has(n.id)){n._c.setAttribute('stroke',egoPre.has(n.id)?'#2f6f9f':'#3a8a5a');n._c.setAttribute('stroke-width',2.4);}
   else{n._c.setAttribute('stroke',n.s.difficult?'#c0532b':(n.s.threshold?'#caa63a':'#fff'));n._c.setAttribute('stroke-width',n.s.difficult?2.4:(n.s.threshold?3:1.2));}});

 function clearSel(){selId=null;egoSet=null;resetStroke();gS.innerHTML='';style();const el=document.getElementById('netside');el.classList.add('empty');el.innerHTML='노드를 클릭하면 선행(파랑)·후속(초록) 계보가 강조되고, “이 개념 위에 몇 개가 쌓이는가(핵심성)”·종속 오개념·보정 연결이 열립니다.';}

 function side(id){const s=skillById[id],u=unitById[unitOf[id]],cats=catBySkill[id]||[];

  const rem=(remBySkill[id]||[]).map(x=>unitById[x]).filter(Boolean);const pct=Math.round((s.dep||0)/maxDep*100);

   <div class="chip">후속(이 위에 쌓임):</div><ul class="lst">${dPost.map(x=>`<li onclick="netSel('${x.id}')" style="cursor:pointer">${x.label} <span class="s">${B.grade_ko[x.grade]}</span></li>`).join('')||'<li class="mut">없음</li>'}</ul></div></details>`;}
 function tick(){const a=alpha;
  for(let i=0;i<N.length;i++){const p=N[i];if(!activeStrand[p.s.strand])continue;

  if(showSat&&selId)drawSat(selId);alpha*=.992;if(alpha<.03)alpha=.03;}
